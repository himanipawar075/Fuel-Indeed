<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Change Password</h2>
        <form id="changePasswordForm" action="/your-servlet-endpoint" method="post">
            <div class="mb-4">
                <label for="uemail" class="block text-gray-700 font-semibold mb-2">Email</label>
                <input type="email" name="uemail" id="uemail" class="w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="upassword" class="block text-gray-700 font-semibold mb-2">Old Password</label>
                <input type="password" name="upassword" id="upassword" class="w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="newPassword" class="block text-gray-700 font-semibold mb-2">New Password</label>
                <input type="password" name="newPassword" id="newPassword" class="w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="block text-gray-700 font-semibold mb-2">Confirm New Password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" class="w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition duration-200">Change Password</button>
        </form>
    </div>
</body>
</html>
