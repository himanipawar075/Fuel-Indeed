<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Change Password</h2>
        <form action="ChangePassword_fuelStation" method="post">
            <div class="mb-4">
                <label for="fpassword" class="block text-gray-700 font-medium mb-2">Old FuelStation Password:</label>
                <input type="text" id="fpassword" name="fpassword" required class="w-full p-2 border border-gray-300 rounded">
            </div>
            <div class="mb-4">
                <label for="femail" class="block text-gray-700 font-medium mb-2">Email:</label>
                <input type="email" id="femail" name="femail" required class="w-full p-2 border border-gray-300 rounded">
            </div>
            <div class="mb-4">
                <label for="newPassword" class="block text-gray-700 font-medium mb-2">New Password:</label>
                <input type="password" id="newPassword" name="newPassword" required class="w-full p-2 border border-gray-300 rounded">
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="block text-gray-700 font-medium mb-2">Confirm New Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required class="w-full p-2 border border-gray-300 rounded">
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition duration-200">Change Password</button>
        </form>
    </div>
</body>
</html>
