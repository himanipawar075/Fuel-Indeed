<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Fuel Rate</title>
    <!-- Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .custom-form {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .custom-input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .custom-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
        }
        .custom-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body class="bg-gray-200">
    <div class="container mx-auto">
        <h1 class="text-center mb-4 text-gray-700">Update Fuel Rate</h1>
        <form action="Update_fuel_rate" method="post" class="custom-form bg-white shadow-md rounded-lg p-4">
            <label for="fpetrolrate" class="block mb-2">Enter Petrol Rate (ltr)</label>
            <input type="text" name="fpetrolrate" id="fpetrolrate" placeholder="Enter the Petrol rate" class="custom-input">

            <label for="fdiselrate" class="block mt-4 mb-2">Enter Diesel Rate (ltr)</label>
            <input type="text" name="fdiselrate" id="fdiselrate" placeholder="Enter the Diesel rate" class="custom-input">

            <input type="submit" value="Update" class="custom-button mt-4">
        </form>
    </div>
</body>
</html>
