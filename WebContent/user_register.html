<!DOCTYPE HTML>
<html>
<head>
    <title>Register - User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link href="css/bootstrap.css" rel='stylesheet' type='text/css' />
    <link href="css/style.css" rel='stylesheet' type='text/css' />
    <link href="css/font-awesome.css" rel="stylesheet"> 
    <link href="//fonts.googleapis.com/css?family=Roboto+Condensed:400,300,300italic,400italic,700,700italic" rel="stylesheet" type="text/css">
</head> 
<body class="cbp-spmenu-push">
    <div class="main-content">
        <div id="page-wrapper">
            <div class="main-page">
                <div class="forms">
                    <h3 class="title1">Register</h3>
                    <div class="form-grids row widget-shadow" data-example-id="basic-forms"> 
                        <div class="form-title">
                            <h4>Enter Following Details :</h4>
                        </div>
                        <div class="form-body">
                            <form action="User_register" method="post"> 
                                <div class="form-group"> 
                                    <label for="Name">Name</label> 
                                    <input type="text" name="uname" class="form-control" id="exampleInputName" placeholder="Name" required> 
                                </div>
                                <div class="form-group"> 
                                    <label for="City">City</label> 
                                    <input type="text" name="ucity" class="form-control" id="exampleInputCity" placeholder="City" required> 
                                </div>
                                <div class="form-group"> 
                                    <label for="Contact">Contact Number</label> 
                                    <input type="text" name="ucontact" class="form-control" id="exampleInputContact" placeholder="Contact Number" required> 
                                </div>
                                <div class="form-group"> 
                                    <label for="Address">Address</label> 
                                    <input type="text" name="uaddress" class="form-control" id="exampleInputAddress" placeholder="Address" required> 
                                </div>
                                <div class="form-group"> 
                                    <label for="Pincode">Pincode</label> 
                                    <input type="text" name="upincode" class="form-control" id="exampleInputPincode" placeholder="Pincode" required> 
                                </div>
                                <div class="form-group"> 
                                    <label for="Email">Email address</label> 
                                    <input type="email" name="uemail" class="form-control" id="exampleInputEmail1" placeholder="Email" required> 
                                </div>
                                <div class="form-group"> 
                                    <label for="Password">Password</label> 
                                    <input type="password" name="upassword" class="form-control" id="exampleInputPassword1" placeholder="Password" required> 
                                </div>
                                <button type="submit" class="btn btn-default">Submit</button> 
                            </form> 
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2024 User Dashboard. All Rights Reserved | Design by <a href="https://w3layouts.com/" target="_blank">w3layouts</a></p>
        </div>
    </div>
</body>
</html>
